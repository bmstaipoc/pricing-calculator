<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .controls {
            max-width: 600px;
            margin: 0 auto 30px;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
        }
        
        select {
            flex: 1;
        }
        
        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border: none;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        .presets {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .preset-btn {
            background-color: #6c757d;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .preset-btn:hover {
            background-color: #5a6268;
        }
        
        .clocks-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .clock {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .clock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .timezone-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .remove-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .remove-btn:hover {
            background-color: #c82333;
        }
        
        .digital-time {
            font-family: 'Courier New', monospace;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            color: #007bff;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin: 15px 0;
            border: 1px solid #ddd;
        }
        
        .clock-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .info-item {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 3px;
            font-size: 13px;
        }
        
        .info-label {
            font-weight: bold;
            color: #666;
            font-size: 11px;
        }
        
        .info-value {
            color: #333;
            margin-top: 5px;
        }
        
        .utc-offset {
            text-align: center;
            background-color: #e7f3ff;
            padding: 10px;
            border-radius: 3px;
            font-weight: bold;
            color: #007bff;
            margin-top: 10px;
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <h1>Global Time Zone Clock</h1>
    
    <div class="controls">
        <div class="control-group">
            <select id="timezone-select">
                <option value="">-- Select a timezone --</option>
                <optgroup label="North America">
                    <option value="America/Los_Angeles">Los Angeles (PST/PDT)</option>
                    <option value="America/Denver">Denver (MST/MDT)</option>
                    <option value="America/Chicago">Chicago (CST/CDT)</option>
                    <option value="America/New_York">New York (EST/EDT)</option>
                    <option value="America/Toronto">Toronto (EST/EDT)</option>
                </optgroup>
                <optgroup label="Europe">
                    <option value="Europe/London">London (GMT/BST)</option>
                    <option value="Europe/Paris">Paris (CET/CEST)</option>
                    <option value="Europe/Berlin">Berlin (CET/CEST)</option>
                    <option value="Europe/Moscow">Moscow (MSK)</option>
                </optgroup>
                <optgroup label="Asia">
                    <option value="Asia/Kolkata">India (IST)</option>
                    <option value="Asia/Bangkok">Bangkok (ICT)</option>
                    <option value="Asia/Shanghai">Shanghai (CST)</option>
                    <option value="Asia/Tokyo">Tokyo (JST)</option>
                    <option value="Asia/Singapore">Singapore (SGT)</option>
                </optgroup>
                <optgroup label="Oceania">
                    <option value="Australia/Sydney">Sydney (AEDT/AEST)</option>
                    <option value="Pacific/Auckland">Auckland (NZDT/NZST)</option>
                </optgroup>
            </select>
            <button onclick="addTimezone()">Add</button>
        </div>
        
        <div class="presets">
            <button class="preset-btn" onclick="loadPreset('default')">Default</button>
            <button class="preset-btn" onclick="loadPreset('americas')">Americas</button>
            <button class="preset-btn" onclick="loadPreset('europe')">Europe/Africa</button>
            <button class="preset-btn" onclick="loadPreset('asia')">Asia/Pacific</button>
        </div>
    </div>
    
    <div class="clocks-container" id="clocks-container"></div>
    
    <script>
        const presets = {
            default: ['America/New_York', 'Europe/London', 'Asia/Tokyo', 'Australia/Sydney'],
            americas: ['America/Los_Angeles', 'America/Chicago', 'America/New_York', 'America/Sao_Paulo'],
            europe: ['Europe/London', 'Europe/Paris', 'Europe/Berlin', 'Europe/Moscow'],
            asia: ['Asia/Kolkata', 'Asia/Bangkok', 'Asia/Tokyo', 'Australia/Sydney']
        };
        
        let timezones = ['America/New_York', 'Europe/London', 'Asia/Tokyo'];
        
        function addTimezone() {
            const select = document.getElementById('timezone-select');
            if (select.value && !timezones.includes(select.value)) {
                timezones.push(select.value);
                select.value = '';
                renderClocks();
            }
        }
        
        function removeTimezone(tz) {
            timezones = timezones.filter(t => t !== tz);
            renderClocks();
        }
        
        function loadPreset(preset) {
            timezones = [...presets[preset]];
            renderClocks();
        }
        
        function getTimeInTimezone(tz) {
            return new Date(new Date().toLocaleString('en-US', { timeZone: tz }));
        }
        
        function formatTime(date) {
            const h = String(date.getHours()).padStart(2, '0');
            const m = String(date.getMinutes()).padStart(2, '0');
            const s = String(date.getSeconds()).padStart(2, '0');
            return h + ':' + m + ':' + s;
        }
        
        function formatDate(date) {
            return date.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
        }
        
        function getDayName(date) {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            return days[date.getDay()];
        }
        
        function getTimezoneName(tz) {
            return tz.split('/').pop().replace(/_/g, ' ');
        }
        
        function getUTCOffset(tz) {
            const date = new Date();
            const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
            const tzDate = new Date(date.toLocaleString('en-US', { timeZone: tz }));
            const offset = (tzDate - utcDate) / (1000 * 60 * 60);
            const sign = offset >= 0 ? '+' : '-';
            const hours = String(Math.abs(Math.floor(offset))).padStart(2, '0');
            const minutes = String(Math.abs(Math.round((offset % 1) * 60))).padStart(2, '0');
            return 'UTC' + sign + hours + ':' + minutes;
        }
        
        function renderClocks() {
            const container = document.getElementById('clocks-container');
            
            if (timezones.length === 0) {
                container.innerHTML = '<div class="empty-state">No timezones selected. Choose one from the dropdown or use a preset.</div>';
                return;
            }
            
            container.innerHTML = timezones.map(tz => {
                const timeObj = getTimeInTimezone(tz);
                const tzName = getTimezoneName(tz);
                const time = formatTime(timeObj);
                const date = formatDate(timeObj);
                const day = getDayName(timeObj);
                const offset = getUTCOffset(tz);
                
                return '<div class="clock">' +
                    '<div class="clock-header">' +
                    '<div class="timezone-name">' + tzName + '</div>' +
                    '<button class="remove-btn" onclick="removeTimezone(\'' + tz + '\')">Remove</button>' +
                    '</div>' +
                    '<div class="digital-time">' + time + '</div>' +
                    '<div class="clock-info">' +
                    '<div class="info-item">' +
                    '<div class="info-label">DATE</div>' +
                    '<div class="info-value">' + date + '</div>' +
                    '</div>' +
                    '<div class="info-item">' +
                    '<div class="info-label">DAY</div>' +
                    '<div class="info-value">' + day + '</div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="utc-offset">' + offset + '</div>' +
                    '</div>';
            }).join('');
        }
        
        function updateClocks() {
            renderClocks();
        }
        
        // Initial render
        renderClocks();
        
        // Update every second
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
